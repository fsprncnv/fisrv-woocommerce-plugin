name: PHP CS Fixer

on:
  push:
    # run on pushes to branches so you can observe the check before PRs
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  php-cs-fixer:
    name: Check PHP coding style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          extensions: mbstring, intl

      - name: Download php-cs-fixer
        run: |
          curl -sSL -o php-cs-fixer https://github.com/FriendsOfPHP/PHP-CS-Fixer/releases/latest/download/php-cs-fixer.phar
          chmod +x php-cs-fixer

      - name: Show php-cs-fixer version
        run: ./php-cs-fixer --version

      - name: Run php-cs-fixer (check only)
        id: php_cs
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./php-cs-fixer fix --config=.php-cs-fixer.php --dry-run --diff --verbose --allow-risky=yes 2>&1 | tee php-cs-fixer-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload php-cs-fixer diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-cs-fixer-diff
          path: php-cs-fixer-output.txt

      - name: Fail if php-cs-fixer found issues
        if: always()
        run: |
          exit_code="${{ steps.php_cs.outputs.exitcode }}"
          if [ -z "$exit_code" ]; then
            echo "No exit code from php-cs-fixer step; assuming failure"
            exit 1
          fi
          if [ "$exit_code" -ne 0 ]; then
            echo "php-cs-fixer exit code: $exit_code - failing job"
            exit $exit_code
          fi
