name: PHP Code Quality

on:
  push:

permissions:
  contents: read

jobs:
  quality-checks:
    name: ${{ matrix.check_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - check_name: php-cs-fixer
            run: php vendor/bin/php-cs-fixer fix --config=../.php-cs-fixer.php --dry-run --diff -v --using-cache=no
          - check_name: phpstan
            run: php vendor/bin/phpstan analyse -c ../phpstan.neon
          - check_name: phpcpd
            run: php vendor/bin/phpcpd --exclude vendor .
          - check_name: phpmd
            run: php vendor/bin/phpmd . text ../phpmd.xml --exclude vendor
          - check_name: phpcodesniffer
            run: php vendor/bin/phpcs --standard=../phpcs.xml.dist --extensions=php --ignore=vendor .

    defaults:
      run:
        working-directory: fiserv-checkout-for-woocommerce

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1
          tools: composer:v2
          extensions: mbstring, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run ${{ matrix.check_name }}
        run: ${{ matrix.run }}
  
